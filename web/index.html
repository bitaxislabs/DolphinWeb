<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dolphin for Web</title>
<style>
:root{
  --bg:#000;--s1:#0b0b0e;--s2:#131316;--s3:#1b1b1f;
  --border:rgba(255,255,255,0.05);--text:#ededf0;--dim:rgba(237,237,240,0.5);
  --muted:rgba(237,237,240,0.2);--ghost:rgba(255,255,255,0.04);
  --accent:#635bff;--accent2:#a855f7;--green:#34d399;--red:#f87171;
  --blue:#60a5fa;--yellow:#fbbf24;--r:14px;
  --f:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif;
  --mono:'SF Mono','Fira Code',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
body{font-family:var(--f);background:var(--bg);color:var(--text)}
::selection{background:rgba(99,91,255,0.2)}
button,select{font-family:var(--f);cursor:pointer}
#app{display:flex;flex-direction:column;height:100vh}

/* ---- Nav ---- */
.nav{display:flex;justify-content:space-between;align-items:center;height:48px;padding:0 20px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;z-index:50}
.nav-l{display:flex;align-items:center;gap:10px}
.nav-icon{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(99,91,255,0.25)}
.nav-icon svg{width:14px;height:14px;fill:#fff}
.nav-name{font-size:14px;font-weight:700;letter-spacing:-0.4px}
.nav-r{display:flex;align-items:center;gap:6px}
.p{font-size:11px;font-weight:600;padding:5px 14px;border-radius:100px;border:none;transition:all 0.15s}
.p-g{background:var(--ghost);color:var(--dim);border:1px solid var(--border)}
.p-g:hover{background:rgba(255,255,255,0.08);color:var(--text)}
.p-a{background:var(--accent);color:#fff;border:1px solid transparent}
.p-a:hover{filter:brightness(1.15);transform:scale(1.02)}
.p-ok{color:var(--green);border-color:rgba(52,211,153,0.3)}
.nav-fps{font-size:11px;font-weight:700;font-family:var(--mono);color:var(--green);min-width:44px;text-align:right;font-variant-numeric:tabular-nums}

/* ---- Stage ---- */
.stage{flex:1;position:relative;overflow:hidden;background:#000;display:flex;align-items:center;justify-content:center}
#canvas{image-rendering:pixelated;image-rendering:crisp-edges;transition:width 0.3s,height 0.3s}
.stage.wide #canvas{aspect-ratio:16/9;width:100%;max-height:100%}
.stage.classic #canvas{aspect-ratio:4/3;height:100%;max-width:100%}

/* ---- Splash ---- */
.splash{position:absolute;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;background:var(--bg);transition:opacity 0.5s;opacity:1}
.splash.out{opacity:0;pointer-events:none}

.s-bg{position:absolute;inset:0;overflow:hidden}
.s-orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:0;animation:orbIn 1.5s ease forwards}
.s-orb.a{width:500px;height:500px;background:rgba(99,91,255,0.07);top:15%;left:25%;animation-delay:0.2s}
.s-orb.b{width:350px;height:350px;background:rgba(168,85,247,0.05);bottom:15%;right:15%;animation-delay:0.5s}
.s-orb.c{width:250px;height:250px;background:rgba(96,165,250,0.04);top:55%;left:5%;animation-delay:0.8s}
@keyframes orbIn{to{opacity:1}}
.s-orb{animation:orbIn 1.5s ease forwards,orbDrift 10s ease-in-out infinite}
@keyframes orbDrift{0%,100%{transform:translate(0,0)}33%{transform:translate(25px,-15px)}66%{transform:translate(-15px,20px)}}

.s-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;max-width:460px;width:100%;padding:0 24px}
.s-inner>*{animation:slideUp 0.7s cubic-bezier(0.16,1,0.3,1) both}
.s-inner>*:nth-child(1){animation-delay:0.1s}
.s-inner>*:nth-child(2){animation-delay:0.2s}
.s-inner>*:nth-child(3){animation-delay:0.3s}
.s-inner>*:nth-child(4){animation-delay:0.4s}
.s-inner>*:nth-child(5){animation-delay:0.5s}
.s-inner>*:nth-child(6){animation-delay:0.6s}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.s-badge{display:flex;align-items:center;gap:8px;padding:6px 14px 6px 8px;background:var(--ghost);border:1px solid var(--border);border-radius:100px;margin-bottom:24px}
.s-badge-dot{width:20px;height:20px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center}
.s-badge-dot svg{width:10px;height:10px;fill:#fff}
.s-badge-text{font-size:12px;font-weight:600;color:var(--dim)}

.s-h{font-size:40px;font-weight:800;letter-spacing:-2px;margin-bottom:8px;text-align:center;line-height:1.1}
.s-h em{font-style:normal;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.s-p{font-size:14px;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:36px;max-width:340px}

/* Drop */
.drop{width:100%;padding:40px 24px;border:1.5px dashed var(--border);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;gap:10px;transition:all 0.25s;cursor:pointer;position:relative;overflow:hidden}
.drop::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(99,91,255,0.04),transparent 70%);opacity:0;transition:opacity 0.25s}
.drop:hover::after,.drop.over::after{opacity:1}
.drop:hover,.drop.over{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 32px rgba(99,91,255,0.08)}
.drop-i{width:44px;height:44px;border-radius:12px;background:rgba(99,91,255,0.08);border:1px solid rgba(99,91,255,0.15);display:flex;align-items:center;justify-content:center}
.drop-i svg{width:22px;height:22px;stroke:var(--accent);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.drop-t{font-size:15px;font-weight:600}
.drop-h{font-size:12px;color:var(--muted)}

/* Options */
.opts{width:100%;margin-top:20px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.opt{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border)}
.opt:last-child{border-bottom:none}
.opt-l{font-size:13px;font-weight:500;color:var(--dim)}
.opt-v{font-size:12px;font-weight:600;color:var(--text);background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:5px 28px 5px 10px;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l3 3 3-3' stroke='%23555' stroke-width='1.2' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center}
.opt-tag{font-size:10px;font-weight:600;color:var(--accent);background:var(--accent-soft,rgba(99,91,255,0.1));border-radius:4px;padding:2px 6px;margin-left:6px}

.s-foot{margin-top:36px;font-size:11px;color:var(--muted);opacity:0.35}
.s-foot a{color:inherit;text-decoration:none}

/* ---- Loader ---- */
.loader{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,0.94)}
.loader.out{display:none}
.l-bar{width:200px;height:3px;background:var(--ghost);border-radius:100px;overflow:hidden;margin-bottom:16px}
.l-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:100px;transition:width 0.3s}
.l-text{font-size:13px;color:var(--dim)}

/* ---- OSC ---- */
.osc{display:none;position:absolute;inset:0;z-index:8;pointer-events:none}
.osc.on{display:block}
.osc-pad{position:absolute;bottom:20px;left:20px;width:110px;height:110px;pointer-events:auto;touch-action:none}
.osc-d{position:absolute;width:34px;height:34px;border-radius:7px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(255,255,255,0.2);touch-action:none;transition:background 0.08s}
.osc-d:active{background:rgba(255,255,255,0.15)}
.osc-d.u{top:0;left:38px}.osc-d.d{bottom:0;left:38px}.osc-d.l{top:38px;left:0}.osc-d.r{top:38px;right:0}
.osc-f{position:absolute;bottom:20px;right:20px;width:110px;height:110px;pointer-events:auto;touch-action:none}
.osc-b{position:absolute;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;touch-action:none;transition:filter 0.08s}
.osc-b:active{filter:brightness(2)}
.osc-b.a{bottom:0;left:36px;background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.18);color:rgba(52,211,153,0.45)}
.osc-b.b{left:0;bottom:36px;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.18);color:rgba(248,113,113,0.45)}
.osc-b.x{right:0;bottom:36px;background:rgba(96,165,250,0.08);border:1px solid rgba(96,165,250,0.18);color:rgba(96,165,250,0.45)}
.osc-b.y{top:0;left:36px;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.18);color:rgba(251,191,36,0.45)}
.osc-sh{position:absolute;top:6px;left:0;right:0;display:flex;justify-content:space-between;padding:0 14px;pointer-events:auto}
.osc-sh div{font-size:10px;font-weight:700;color:rgba(255,255,255,0.18);background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);border-radius:6px;padding:7px 22px;touch-action:none}
.osc-sh div:active{background:rgba(255,255,255,0.1)}
.osc-m{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;pointer-events:auto}
.osc-m div{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;color:rgba(255,255,255,0.15);background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:100px;padding:5px 14px;touch-action:none}

/* ---- Console ---- */
.con-t{flex-shrink:0;width:100%;padding:4px;text-align:center;font-size:10px;font-weight:500;color:var(--muted);background:var(--s1);border:none;border-top:1px solid var(--border);font-family:var(--f)}
.con-p{max-height:0;overflow:hidden;background:rgba(0,0,0,0.9);transition:max-height 0.2s;flex-shrink:0}
.con-p.open{max-height:120px}
.con-e{padding:6px 10px;max-height:110px;overflow-y:auto;font-family:var(--mono);font-size:10px;line-height:1.5;color:var(--muted);white-space:pre-wrap}

@media(max-width:768px){.osc.on{display:block}.nav{height:40px;padding:0 12px}.nav-name{font-size:12px}.p{font-size:10px;padding:4px 10px}.s-h{font-size:30px}}
@media(min-width:769px){.osc{display:none!important}}
</style>
</head>
<body>
<div id="app">
  <nav class="nav">
    <div class="nav-l">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg></div>
      <span class="nav-name">Dolphin for Web</span>
    </div>
    <div class="nav-r">
      <span class="nav-fps" id="fps"></span>
      <button class="p p-g" id="ctrlBtn" onclick="connectCtrl()">Controller</button>
      <button class="p p-g" onclick="toggleAspect()">4:3</button>
      <button class="p p-a" onclick="document.getElementById('rf').click()">Load ROM</button>
      <input type="file" id="rf" accept=".iso,.gcm,.rvz,.gcz,.wbfs,.wad,.dol,.elf" style="display:none" onchange="handleROM(this.files[0])">
    </div>
  </nav>

  <div class="stage classic" id="stage">
    <canvas id="canvas" width="640" height="480"></canvas>

    <div class="splash" id="splash">
      <div class="s-bg"><div class="s-orb a"></div><div class="s-orb b"></div><div class="s-orb c"></div></div>
      <div class="s-inner">
        <div class="s-badge">
          <div class="s-badge-dot"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg></div>
          <span class="s-badge-text">Powered by WebAssembly</span>
        </div>
        <h1 class="s-h">Dolphin <em>for Web</em></h1>
        <p class="s-p">GameCube and Wii emulation in your browser. Upload a ROM to play.</p>

        <div class="drop" id="dz" onclick="document.getElementById('rf').click()">
          <div class="drop-i"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg></div>
          <div class="drop-t">Select or drop a ROM</div>
          <div class="drop-h">.iso .gcm .rvz .gcz .wbfs .wad</div>
        </div>

        <div class="opts">
          <div class="opt">
            <span class="opt-l">CPU Backend</span>
            <div style="display:flex;align-items:center">
              <select class="opt-v" id="optCpu">
                <option value="5" selected>Cached Interpreter</option>
                <option value="6" disabled>WASM JIT (coming soon)</option>
                <option value="0">Interpreter (slower)</option>
              </select>
              <span class="opt-tag" id="cpuTag">Default</span>
            </div>
          </div>
          <div class="opt">
            <span class="opt-l">Renderer</span>
            <select class="opt-v" id="optVid">
              <option value="sw" selected>Software</option>
              <option value="ogl" disabled>WebGL (WIP)</option>
            </select>
          </div>
          <div class="opt">
            <span class="opt-l">Aspect Ratio</span>
            <select class="opt-v" id="optAR" onchange="setAspect(this.value)">
              <option value="classic" selected>4:3</option>
              <option value="wide">16:9</option>
            </select>
          </div>
          <div class="opt">
            <span class="opt-l">Controllers</span>
            <select class="opt-v" id="optPorts">
              <option value="1" selected>1 Player</option>
              <option value="2">2 Players</option>
              <option value="3">3 Players</option>
              <option value="4">4 Players</option>
            </select>
          </div>
          <div class="opt">
            <span class="opt-l">Skip Idle</span>
            <select class="opt-v" id="optIdle">
              <option value="1" selected>On</option>
              <option value="0">Off</option>
            </select>
          </div>
        </div>

        <div class="s-foot"><a href="https://bitaxislabs.com" target="_blank">Bit-Axis Labs</a></div>
      </div>
    </div>

    <div class="loader out" id="loader">
      <div class="l-bar"><div class="l-fill" id="lFill"></div></div>
      <div class="l-text" id="lText">Loading...</div>
    </div>

    <div class="osc" id="osc">
      <div class="osc-sh"><div>L</div><div>R</div></div>
      <div class="osc-pad"><div class="osc-d u">&#9650;</div><div class="osc-d d">&#9660;</div><div class="osc-d l">&#9664;</div><div class="osc-d r">&#9654;</div></div>
      <div class="osc-f"><div class="osc-b a">A</div><div class="osc-b b">B</div><div class="osc-b x">X</div><div class="osc-b y">Y</div></div>
      <div class="osc-m"><div>START</div><div>Z</div></div>
    </div>
  </div>

  <button class="con-t" onclick="toggleCon()">Console</button>
  <div class="con-p" id="cp"><div class="con-e" id="ce"></div></div>
</div>

<script>
let co=false,aspect='classic';
function toggleCon(){co=!co;document.getElementById('cp').classList.toggle('open',co)}
function log(m){const e=document.getElementById('ce');e.textContent+=m+'\n';e.scrollTop=e.scrollHeight}

function setAspect(v){
  aspect=v;
  const s=document.getElementById('stage');
  s.classList.remove('wide','classic');
  s.classList.add(v);
  document.querySelectorAll('.nav-r .p')[1].textContent=v==='wide'?'16:9':'4:3';
}

function writeGfxConfig(){
  if(typeof FS==='undefined')return;
  try{FS.mkdir('/dolphin-data')}catch(x){}
  try{FS.mkdir('/dolphin-data/User')}catch(x){}
  try{FS.mkdir('/dolphin-data/User/Config')}catch(x){}
  var wide=aspect==='wide';
  // AspectRatio: 0=Auto, 1=Force16:9, 2=Force4:3, 3=Stretch
  var cfg='[Settings]\nwideScreenHack = '+(wide?'True':'False')+'\nAspectRatio = '+(wide?'1':'2')+'\n';
  FS.writeFile('/dolphin-data/User/Config/GFX.ini',cfg);
}
function toggleAspect(){setAspect(aspect==='classic'?'wide':'classic');document.getElementById('optAR').value=aspect}

const dz=document.getElementById('dz');
document.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over')});
document.addEventListener('dragleave',()=>dz.classList.remove('over'));
document.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');if(e.dataTransfer.files.length)handleROM(e.dataTransfer.files[0])});

document.getElementById('optCpu').addEventListener('change',function(){
  const t=document.getElementById('cpuTag');
  t.textContent=this.value==='5'?'Default':this.value==='6'?'Experimental':'Slow';
  t.style.color=this.value==='6'?'var(--yellow)':this.value==='0'?'var(--red)':'var(--accent)';
  t.style.background=this.value==='6'?'rgba(251,191,36,0.1)':this.value==='0'?'rgba(248,113,113,0.1)':'rgba(99,91,255,0.1)';
});

function handleROM(file){
  if(!file)return;
  // If emulator already running, reload page with the new ROM
  if(window._emuReady){
    // Store ROM in sessionStorage and reload
    var reader=new FileReader();
    reader.onload=function(e){
      // Can't store large files in sessionStorage, use IndexedDB
      var req=indexedDB.open('dolphin_rom',1);
      req.onupgradeneeded=function(ev){ev.target.result.createObjectStore('roms')};
      req.onsuccess=function(ev){
        var db=ev.target.result;
        var tx=db.transaction('roms','readwrite');
        tx.objectStore('roms').put({data:new Uint8Array(e.target.result),name:file.name},'pending');
        tx.oncomplete=function(){window.location.reload()};
      };
    };
    reader.readAsArrayBuffer(file);
    return;
  }
  log('Loading: '+file.name+' ('+(file.size/1048576).toFixed(1)+'MB)');
  document.getElementById('splash').classList.add('out');
  document.getElementById('loader').classList.remove('out');
  document.getElementById('lText').textContent='Reading '+file.name+'...';
  document.getElementById('lFill').style.width='0%';
  const r=new FileReader();
  r.onprogress=e=>{if(e.lengthComputable){var p=Math.round(e.loaded/e.total*100);document.getElementById('lFill').style.width=p+'%';document.getElementById('lText').textContent='Reading... '+p+'%'}};
  r.onload=e=>{
    const d=new Uint8Array(e.target.result);
    log('ROM: '+d.length+' bytes');
    document.getElementById('lFill').style.width='100%';
    document.getElementById('lText').textContent='Starting emulator...';
    if(typeof FS!=='undefined'){try{FS.mkdir('/rom')}catch(x){}var p='/rom/game.'+file.name.split('.').pop();FS.writeFile(p,d);log('Written to VFS');bootEmu(p)}
    else{window._rom={d:d,ext:file.name.split('.').pop()};loadWasm()}
  };
  r.readAsArrayBuffer(file);
}

function bootEmu(path){
  document.getElementById('lText').textContent='Booting...';
  log('Boot: '+path);
  writeGfxConfig();
  Module.callMain(['-e',path,'-p','headless','-u','/dolphin-data/User']);
  window._emuReady=true;
  document.getElementById('loader').classList.add('out');
  if(window.innerWidth<=768)document.getElementById('osc').classList.add('on');
}

function loadWasm(){var s=document.createElement('script');s.src='dolphin-emu-nogui.js';document.body.appendChild(s)}

let bleManager=null,controllerState=null;
async function connectCtrl(){
  if(!navigator.bluetooth){log('Web Bluetooth not available');return}
  if(!bleManager){
    bleManager=new BLEManager();
    bleManager.onLog=function(m){log(m)};
    bleManager.onStateChange=function(s){var b=document.getElementById('ctrlBtn');if(s==='connected'){b.textContent='Connected';b.classList.add('p-ok')}else if(s==='scanning'||s==='connecting'||s==='pairing')b.textContent=s.charAt(0).toUpperCase()+s.slice(1)+'...'};
    bleManager.onControllerUpdate=function(c){
      controllerState=c.state;
      if(!controllerState||!window._emuReady)return;
      var s=controllerState,port=(c.playerNumber||1)-1;
      Module._dolphin_set_controller_state(port,s.buttons>>>0,s.calLeftX||0,s.calLeftY||0,s.calRightX||0,s.calRightY||0,s.calTriggerL||0,s.calTriggerR||0);
    };
    bleManager.onControllerAdded=function(c){log('Ready: '+c.name+' (P'+c.playerNumber+')');document.getElementById('ctrlBtn').textContent=c.name;document.getElementById('ctrlBtn').classList.add('p-ok')};
  }
  await bleManager.scan();
}

var Module={
  canvas:document.getElementById('canvas'),
  print:log,
  printErr:function(t){log('[err] '+t)},
  onRuntimeInitialized:function(){
    log('WASM runtime ready');
    if(window._rom){
      try{FS.mkdir('/rom')}catch(x){}
      var p='/rom/game.'+window._rom.ext;
      FS.writeFile(p,window._rom.d);
      log('ROM written to VFS: '+p);
      window._rom=null;
      log('Calling main()...');
      writeGfxConfig();
      Module.callMain(['-e',p,'-p','headless','-u','/dolphin-data/User']);
      window._emuReady=true;
      document.getElementById('loader').classList.add('out');
      if(window.innerWidth<=768)document.getElementById('osc').classList.add('on');
    }
  },
  noInitialRun:true,
  arguments:[]
};
</script>
<script>
// Check for pending ROM from reload
(function(){
  var req=indexedDB.open('dolphin_rom',1);
  req.onupgradeneeded=function(ev){ev.target.result.createObjectStore('roms')};
  req.onsuccess=function(ev){
    var db=ev.target.result;
    try{
      var tx=db.transaction('roms','readwrite');
      var get=tx.objectStore('roms').get('pending');
      get.onsuccess=function(){
        if(get.result){
          var rom=get.result;
          tx.objectStore('roms').delete('pending');
          log('Resuming: '+rom.name);
          document.getElementById('splash').classList.add('out');
          document.getElementById('loader').classList.remove('out');
          document.getElementById('lText').textContent='Starting '+rom.name+'...';
          document.getElementById('lFill').style.width='100%';
          window._rom={d:rom.data,ext:rom.name.split('.').pop()};
          loadWasm();
        }
      };
    }catch(e){}
  };
})();
</script>
<script src="packet-parser.js"></script>
<script src="ble-manager.js"></script>
</body>
